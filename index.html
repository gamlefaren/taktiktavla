<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Taktiktavla</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
  :root {
    --ui-bg: #111827; --ui-surface: #1f2937; --ui-border: #374151;
    --ui-text: #f9fafb; --ui-muted: #9ca3af; --accent: #3b82f6;
  }
  body {
    background: var(--ui-bg); color: var(--ui-text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex; flex-direction: column;
    height: 100dvh; overflow: hidden; user-select: none; -webkit-user-select: none;
  }

  /* ── TOP BAR: two rows ── */
  #topbar {
    background: var(--ui-surface);
    border-bottom: 1px solid var(--ui-border);
    flex-shrink: 0;
    padding: 5px 8px 5px;
    display: flex; flex-direction: column; gap: 5px;
  }
  #topbar-row1 {
    display: flex; align-items: center; gap: 5px;
  }
  #topbar h1 {
    font-size: 12px; font-weight: 800; letter-spacing: .05em;
    text-transform: uppercase; color: #f5d20e;
    white-space: nowrap; flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis;
  }
  #topbar-row2 {
    display: flex; gap: 5px; align-items: center;
  }
  .tb-btn {
    background: var(--ui-border); border: none; color: var(--ui-text);
    border-radius: 6px; padding: 5px 8px; font-size: 11px; font-weight: 600;
    cursor: pointer; white-space: nowrap; flex: 1;
  }
  .tb-btn.danger { background: #7f1d1d; color: #fca5a5; }
  .tb-btn.sm { flex: none; padding: 5px 7px; }

  #canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #0d1117; min-height: 0; }
  #pitch-canvas { display: block; touch-action: none; -webkit-touch-callout: none; }

  /* ── BOTTOM TOOLBAR ── */
  #toolbar { background: var(--ui-surface); border-top: 1px solid var(--ui-border); flex-shrink: 0; }
  #tab-nav { display: flex; border-bottom: 1px solid var(--ui-border); }
  .tab-btn { flex: 1; padding: 6px 4px; background: none; border: none; color: var(--ui-muted); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; cursor: pointer; border-bottom: 2px solid transparent; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-panel { display: none; padding: 6px 8px 8px; }
  .tab-panel.active { display: flex; flex-direction: column; gap: 5px; }

  /* Each row in the panel */
  .tool-row { display: flex; align-items: center; gap: 4px; }
  .tool-label { font-size: 10px; color: var(--ui-muted); width: 46px; flex-shrink: 0; }

  .tool-btn {
    background: var(--ui-border); border: 2px solid transparent; color: var(--ui-text);
    border-radius: 5px; padding: 4px 8px; font-size: 11px; font-weight: 600; cursor: pointer;
    flex: 1; text-align: center;
  }
  .tool-btn.active { border-color: var(--accent); background: #1e3a5f; color: #93c5fd; }
  .tool-btn.danger { background: #7f1d1d; color: #fca5a5; }
  .tool-btn.danger.active { border-color: #ef4444; background: #991b1b; }

  .color-row { display: flex; gap: 5px; align-items: center; flex-wrap: nowrap; overflow: hidden; }
  .swatch { width: 22px; height: 22px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; flex-shrink: 0; transition: transform .1s, border-color .15s; }
  .swatch.active { border-color: #fff; transform: scale(1.15); }

  .color-pick-wrap { position: relative; width: 22px; height: 22px; flex-shrink: 0; }
  .color-pick-wrap input[type=color] { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; border-radius: 50%; }
  .color-pick-swatch { width: 22px; height: 22px; border-radius: 50%; border: 2px dashed #9ca3af; pointer-events: none; background: conic-gradient(red,yellow,lime,cyan,blue,magenta,red); }

  .width-btn { background: var(--ui-border); border: 2px solid transparent; border-radius: 5px; width: 36px; height: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
  .width-btn.active { border-color: var(--accent); background: #1e3a5f; }
  .width-btn span { background: #fff; border-radius: 2px; display: block; width: 20px; }

  /* Modals */
  #modal-overlay, #ball-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 100; align-items: center; justify-content: center; }
  #modal-overlay.show, #ball-modal-overlay.show { display: flex; }
  #modal { background: var(--ui-surface); border: 1px solid var(--ui-border); border-radius: 12px; padding: 20px; width: min(320px,88vw); }
  #modal h3 { font-size: 13px; margin-bottom: 10px; color: var(--ui-muted); text-transform: uppercase; letter-spacing: .05em; }
  #modal input { width: 100%; background: var(--ui-bg); border: 1px solid var(--ui-border); border-radius: 6px; color: var(--ui-text); font-size: 16px; padding: 10px; margin-bottom: 12px; outline: none; }
  #modal input:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btn { flex: 1; padding: 10px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .modal-btn.confirm { background: var(--accent); color: #fff; }
  .modal-btn.cancel { background: var(--ui-border); color: var(--ui-text); }
  #player-color-row, #ball-color-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .pswatch { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: transform .1s, border-color .1s; }
  .pswatch.active { border-color: #fff; transform: scale(1.2); }
</style>
</head>
<body>

<div id="topbar">
  <div id="topbar-row1">
    <h1>Perssons taktiktavla</h1>
    <button class="tb-btn sm" id="btn-undo">↩ Ångra</button>
    <button class="tb-btn sm danger" id="btn-clear">🗑 Rensa</button>
  </div>
  <div id="topbar-row2">
    <button class="tb-btn" id="btn-add-player">+ Spelare</button>
    <button class="tb-btn" id="btn-add-ball">+ Boll</button>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="pitch-canvas"></canvas>
</div>

<div id="toolbar">
  <div id="tab-nav">
    <button class="tab-btn active" data-tab="draw">✏️ Rita</button>
    <button class="tab-btn" data-tab="colors">🎨 Planfärger</button>
  </div>

  <div class="tab-panel active" id="tab-draw">
    <div class="tool-row">
      <span class="tool-label">Verktyg</span>
      <button class="tool-btn" data-tool="line">Linje</button>
      <button class="tool-btn" data-tool="dashed">Streckad</button>
      <button class="tool-btn active" data-tool="move">Flytta</button>
      <button class="tool-btn danger" data-tool="erase">Radera</button>
    </div>
    <div class="tool-row">
      <span class="tool-label">Tjocklek</span>
      <div class="width-btn active" data-w="2"><span style="height:2px"></span></div>
      <div class="width-btn" data-w="4"><span style="height:4px"></span></div>
      <div class="width-btn" data-w="7"><span style="height:7px"></span></div>
      <span style="flex:1"></span>
      <div class="color-row" id="draw-colors" style="flex-wrap:nowrap;">
        <div class="swatch active" style="background:#ffffff" data-color="#ffffff"></div>
        <div class="swatch" style="background:#f87171" data-color="#f87171"></div>
        <div class="swatch" style="background:#fb923c" data-color="#fb923c"></div>
        <div class="swatch" style="background:#facc15" data-color="#facc15"></div>
        <div class="swatch" style="background:#4ade80" data-color="#4ade80"></div>
        <div class="swatch" style="background:#60a5fa" data-color="#60a5fa"></div>
        <div class="swatch" style="background:#c084fc" data-color="#c084fc"></div>
        <div class="color-pick-wrap">
          <div class="color-pick-swatch"></div>
          <input type="color" id="draw-custom-color" value="#ff6600">
        </div>
      </div>
    </div>
  </div>

  <div class="tab-panel" id="tab-colors">
    <div class="tool-row">
      <span class="tool-label">Plan</span>
      <div class="color-row" id="pitch-colors">
        <div class="swatch active" style="background:#1a4fa0" data-pc="#1a4fa0"></div>
        <div class="swatch" style="background:#166534" data-pc="#166534"></div>
        <div class="swatch" style="background:#1e293b" data-pc="#1e293b"></div>
        <div class="swatch" style="background:#78350f" data-pc="#78350f"></div>
        <div class="swatch" style="background:#374151" data-pc="#374151"></div>
        <div class="color-pick-wrap">
          <div class="color-pick-swatch"></div>
          <input type="color" id="pitch-custom-color" value="#1a4fa0">
        </div>
      </div>
    </div>
    <div class="tool-row">
      <span class="tool-label">Planlinjer</span>
      <div class="color-row" id="line-colors">
        <div class="swatch active" style="background:#f5d20e" data-lc="#f5d20e"></div>
        <div class="swatch" style="background:#ffffff" data-lc="#ffffff"></div>
        <div class="swatch" style="background:#f87171" data-lc="#f87171"></div>
        <div class="swatch" style="background:#4ade80" data-lc="#4ade80"></div>
        <div class="swatch" style="background:#60a5fa" data-lc="#60a5fa"></div>
        <div class="color-pick-wrap">
          <div class="color-pick-swatch"></div>
          <input type="color" id="line-custom-color" value="#f5d20e">
        </div>
      </div>
    </div>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal">
    <h3>Lägg till spelare</h3>
    <div id="player-color-row"></div>
    <input type="text" id="player-name-input" placeholder="Namn eller nummer..." maxlength="10" autocomplete="off">
    <div class="modal-btns">
      <button class="modal-btn cancel" id="modal-cancel">Avbryt</button>
      <button class="modal-btn confirm" id="modal-confirm">Lägg till</button>
    </div>
  </div>
</div>

<div id="ball-modal-overlay">
  <div id="modal">
    <h3>Lägg till boll</h3>
    <div id="ball-color-row"></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" id="ball-modal-cancel">Avbryt</button>
      <button class="modal-btn confirm" id="ball-modal-confirm">Lägg till</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('pitch-canvas');
const ctx    = canvas.getContext('2d');

// ── State ──
let pitchColor = '#1a4fa0', lineColor = '#f5d20e';
let drawColor  = '#ffffff', drawWidth = 2, tool = 'move';
let players = [], balls = [], drawnLines = [], drag = null, drawPath = null;
let W, H, S, GOAL_PX; // canvas px: width, pitch height, scale, goal area height
// Total canvas height = GOAL_PX + H

// ── Undo stack ──
// Each entry is a snapshot: {players, balls, drawnLines}
let undoStack = [];
function saveState() {
  undoStack.push({
    players:    players.map(p => ({...p})),
    balls:      balls.map(b => ({...b})),
    drawnLines: drawnLines.map(l => ({...l, points: l.points.map(p => ({...p}))}))
  });
  if (undoStack.length > 40) undoStack.shift();
}
function undo() {
  if (!undoStack.length) return;
  const s = undoStack.pop();
  players    = s.players;
  balls      = s.balls;
  drawnLines = s.drawnLines;
  render();
}

// ── Real dimensions (metres) ──
// Half-pitch: 20 m wide × 20 m long
// ORIENTATION: mållinje (goal) at TOP of pitch area, mittlinje at BOTTOM
// Goal is drawn ABOVE the pitch in a separate strip
const RW = 20, RH = 20;
const GL = 8.5, GR = 11.5; // goal post x positions (metres from left sideline)
const GOAL_DEPTH_M = 1.0;   // goal depth in metres (drawn above mållinje)

function resize() {
  const wrap = document.getElementById('canvas-wrap');
  const aw = wrap.clientWidth, ah = wrap.clientHeight;
  // Reserve ~10% of height for goal area above pitch
  const goalFrac = 0.10;
  // Scale so pitch (RW × RH) fits in remaining space
  S = Math.min(aw / RW, (ah * (1 - goalFrac)) / RH) * 0.97;
  W = RW * S;
  H = RH * S;
  GOAL_PX = GOAL_DEPTH_M * S + 4; // goal strip height in px (goal depth + small margin)
  const totalH = Math.round(H + GOAL_PX);
  canvas.width  = Math.round(W);
  canvas.height = totalH;
  canvas.style.width  = Math.round(W) + 'px';
  canvas.style.height = totalH + 'px';
  render();
}

// Convert real metres → canvas px (within the PITCH area, which starts at y=GOAL_PX)
const m2x = m => m * S;
const m2y = m => GOAL_PX + m * S;  // pitch Y: 0=mållinje (top of pitch), 20=mittlinje

// ── Draw pitch ──
function drawPitch() {
  // Clear entire canvas (pitch + goal area)
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Goal area background (dark strip above pitch)
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, canvas.width, GOAL_PX);

  // Pitch background
  ctx.fillStyle = pitchColor;
  ctx.fillRect(0, GOAL_PX, W, H);

  const lw  = Math.max(1,   S * 0.05);
  const lw8 = Math.max(1.5, S * 0.08);
  ctx.strokeStyle = lineColor;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  // ─ Outer pitch border ─
  ctx.lineWidth = lw;
  ctx.strokeRect(0, GOAL_PX, W, H);

  // ─ Avkastcirkel: r=2m centred at bottom midpoint ─
  ctx.beginPath();
  ctx.arc(m2x(10), m2y(20), m2x(2), 0, Math.PI * 2);
  ctx.stroke();

  // ─ Mållinje between posts (8 cm) ─
  ctx.lineWidth = lw8;
  ctx.beginPath();
  ctx.moveTo(m2x(GL), m2y(0));
  ctx.lineTo(m2x(GR), m2y(0));
  ctx.stroke();
  ctx.lineWidth = lw;

  // ─ Goal frame: drawn ABOVE mållinje (outside pitch) ─
  // Posts go from y=GOAL_PX (mållinje) upward to y=0 (top of goal strip)
  // Back of goal at y = GOAL_PX - GOAL_DEPTH_M*S
  const goalTopY = GOAL_PX - GOAL_DEPTH_M * S;
  const goalLineW = Math.max(2, S * 0.08);
  ctx.lineWidth = goalLineW;
  ctx.strokeStyle = lineColor;
  ctx.beginPath();
  ctx.moveTo(m2x(GL), m2y(0));      // left post base (on mållinje)
  ctx.lineTo(m2x(GL), goalTopY);    // left post top
  ctx.lineTo(m2x(GR), goalTopY);    // crossbar (back of goal)
  ctx.lineTo(m2x(GR), m2y(0));      // right post top → base
  ctx.stroke();
  ctx.lineWidth = lw;
  ctx.strokeStyle = lineColor;

  // ─ 4-meterslinje ─
  const cx = m2x(10);
  ctx.beginPath();
  ctx.moveTo(cx - m2x(0.075), m2y(4));
  ctx.lineTo(cx + m2x(0.075), m2y(4));
  ctx.stroke();

  // ─ 7-meterslinje ─
  ctx.beginPath();
  ctx.moveTo(cx - m2x(0.5), m2y(7));
  ctx.lineTo(cx + m2x(0.5), m2y(7));
  ctx.stroke();

  // ─ Målgårdslinje 6 m ─
  ctx.beginPath();
  ctx.arc(m2x(GL), m2y(0), m2x(6), Math.PI, Math.PI/2, true);
  ctx.lineTo(m2x(GR), m2y(6));
  ctx.arc(m2x(GR), m2y(0), m2x(6), Math.PI/2, 0, true);
  ctx.stroke();

  // ─ Frikastlinje 9 m (streckad) ─
  const d = m2x(0.15);
  ctx.setLineDash([d, d]);
  ctx.beginPath();
  ctx.arc(m2x(GL), m2y(0), m2x(9), Math.PI, Math.PI/2, true);
  ctx.lineTo(m2x(GR), m2y(9));
  ctx.arc(m2x(GR), m2y(0), m2x(9), Math.PI/2, 0, true);
  ctx.stroke();
  ctx.setLineDash([]);

  // ─ Avbytarlinjemarkering ─
  const tick = m2x(0.15);
  const ay1  = m2y(15.5), ay2 = m2y(15.0);
  ctx.beginPath();
  ctx.moveTo(0, ay1); ctx.lineTo(tick, ay1);
  ctx.moveTo(0, ay2); ctx.lineTo(tick, ay2);
  ctx.moveTo(W, ay1); ctx.lineTo(W - tick, ay1);
  ctx.moveTo(W, ay2); ctx.lineTo(W - tick, ay2);
  ctx.stroke();
}

function renderLines() {
  drawnLines.forEach(ln => {
    if (ln.points.length < 2) return;
    ctx.save();
    ctx.strokeStyle = ln.color; ctx.lineWidth = ln.width;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    if (ln.dashed) ctx.setLineDash([12, 8]);
    ctx.beginPath();
    ln.points.forEach((pt, i) => i ? ctx.lineTo(pt.x, pt.y) : ctx.moveTo(pt.x, pt.y));
    ctx.stroke(); ctx.setLineDash([]); ctx.restore();
  });
}

const PCOLS = ['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#a855f7','#ec4899','#14b8a6','#f43f5e','#94a3b8'];
let chosenColor = PCOLS[0];
const PR = 13; // player radius px (smaller)
const BR = 7;  // ball radius px (~half of player)

function renderPlayers() {
  players.forEach(p => {
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,.55)'; ctx.shadowBlur = 7; ctx.shadowOffsetY = 2;
    ctx.beginPath(); ctx.arc(p.x, p.y, PR, 0, Math.PI*2);
    ctx.fillStyle = p.color; ctx.fill();
    ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(255,255,255,.4)'; ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.round(PR * .72)}px 'Segoe UI', sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const lbl = (p.name || '').slice(0, 3).toUpperCase();
    ctx.fillText(lbl, p.x, p.y);
    ctx.restore();

    if (p.name) {
      ctx.save();
      ctx.fillStyle = 'rgba(255,255,255,.92)';
      ctx.font = `600 ${Math.round(PR * .52)}px 'Segoe UI', sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText(p.name, p.x, p.y + PR + 2);
      ctx.restore();
    }
  });
}

function renderBalls() {
  balls.forEach(b => {
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,.55)'; ctx.shadowBlur = 5; ctx.shadowOffsetY = 2;
    ctx.beginPath(); ctx.arc(b.x, b.y, BR, 0, Math.PI*2);
    ctx.fillStyle = b.color; ctx.fill();
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = b.color === '#ffffff' ? 'rgba(0,0,0,.3)' : 'rgba(255,255,255,.4)';
    ctx.stroke();
    ctx.restore();
  });
}

function render() { drawPitch(); renderLines(); renderPlayers(); renderBalls(); }

// ── Input ──
function getPos(e) {
  const r = canvas.getBoundingClientRect(), src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX - r.left) * (canvas.width / r.width),
           y: (src.clientY - r.top)  * (canvas.height / r.height) };
}
function hitPlayer(x, y) {
  for (let i = players.length-1; i >= 0; i--) {
    const p = players[i], dx = p.x-x, dy = p.y-y;
    if (dx*dx + dy*dy <= (PR+8)*(PR+8)) return i;
  } return -1;
}
function hitBall(x, y) {
  for (let i = balls.length-1; i >= 0; i--) {
    const b = balls[i], dx = b.x-x, dy = b.y-y;
    if (dx*dx + dy*dy <= (BR+8)*(BR+8)) return i;
  } return -1;
}
function distSeg(p, a, b) {
  const dx=b.x-a.x, dy=b.y-a.y;
  if (!dx && !dy) return Math.hypot(p.x-a.x, p.y-a.y);
  const t = Math.max(0,Math.min(1,((p.x-a.x)*dx+(p.y-a.y)*dy)/(dx*dx+dy*dy)));
  return Math.hypot(p.x-(a.x+t*dx), p.y-(a.y+t*dy));
}

// Prevent page scroll when touching the canvas
canvas.addEventListener('touchmove', e => { e.preventDefault(); }, { passive: false });
canvas.addEventListener('touchstart', e => { e.preventDefault(); }, { passive: false });

canvas.addEventListener('pointerdown', e => {
  e.preventDefault(); const pos = getPos(e);
  if (tool==='move') {
    const i = hitPlayer(pos.x,pos.y);
    if (i>=0) { saveState(); drag={type:'player',idx:i}; canvas.setPointerCapture(e.pointerId); return; }
    const bi = hitBall(pos.x,pos.y);
    if (bi>=0) { saveState(); drag={type:'ball',idx:bi}; canvas.setPointerCapture(e.pointerId); return; }
  } else if (tool==='erase') {
    const i = hitPlayer(pos.x,pos.y);
    if (i>=0) { saveState(); players.splice(i,1); render(); return; }
    const bi = hitBall(pos.x,pos.y);
    if (bi>=0) { saveState(); balls.splice(bi,1); render(); return; }
    for (let li=drawnLines.length-1; li>=0; li--) {
      const ln=drawnLines[li];
      for (let j=0; j<ln.points.length-1; j++) {
        if (distSeg(pos,ln.points[j],ln.points[j+1]) < 14) { saveState(); drawnLines.splice(li,1); render(); return; }
      }
    }
  } else {
    drawPath = {points:[pos], color:drawColor, width:drawWidth, dashed:tool==='dashed'};
    canvas.setPointerCapture(e.pointerId);
  }
});

canvas.addEventListener('pointermove', e => {
  e.preventDefault(); const pos = getPos(e);
  if (drag) {
    if (drag.type==='player') { players[drag.idx].x=pos.x; players[drag.idx].y=pos.y; }
    else { balls[drag.idx].x=pos.x; balls[drag.idx].y=pos.y; }
    render();
  } else if (drawPath) {
    const last=drawPath.points[drawPath.points.length-1], dx=pos.x-last.x, dy=pos.y-last.y;
    if (dx*dx+dy*dy > 6) {
      drawPath.points.push(pos); render();
      ctx.save(); ctx.strokeStyle=drawPath.color; ctx.lineWidth=drawPath.width;
      ctx.lineCap='round'; ctx.lineJoin='round';
      if (drawPath.dashed) ctx.setLineDash([12,8]);
      ctx.beginPath();
      drawPath.points.forEach((pt,i) => i ? ctx.lineTo(pt.x,pt.y) : ctx.moveTo(pt.x,pt.y));
      ctx.stroke(); ctx.setLineDash([]); ctx.restore();
    }
  }
});

canvas.addEventListener('pointerup', e => {
  e.preventDefault();
  if (drag) { drag=null; render(); }
  if (drawPath) {
    if (drawPath.points.length>1) { saveState(); drawnLines.push(drawPath); }
    drawPath=null; render();
  }
});

  b.classList.add('active');
  document.getElementById('tab-'+b.dataset.tab).classList.add('active');
}));

document.querySelectorAll('[data-tool]').forEach(b => b.addEventListener('click', () => {
  tool = b.dataset.tool;
  document.querySelectorAll('[data-tool]').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
}));

document.querySelectorAll('#draw-colors .swatch').forEach(sw => sw.addEventListener('click', () => {
  document.querySelectorAll('#draw-colors .swatch').forEach(s => s.classList.remove('active'));
  sw.classList.add('active'); drawColor = sw.dataset.color;
}));
document.getElementById('draw-custom-color').addEventListener('input', function() {
  drawColor=this.value; document.querySelectorAll('#draw-colors .swatch').forEach(s=>s.classList.remove('active'));
});

document.querySelectorAll('#pitch-colors .swatch').forEach(sw => sw.addEventListener('click', () => {
  document.querySelectorAll('#pitch-colors .swatch').forEach(s => s.classList.remove('active'));
  sw.classList.add('active'); pitchColor = sw.dataset.pc; render();
}));
document.getElementById('pitch-custom-color').addEventListener('input', function() {
  pitchColor=this.value; document.querySelectorAll('#pitch-colors .swatch').forEach(s=>s.classList.remove('active')); render();
});

document.querySelectorAll('#line-colors .swatch').forEach(sw => sw.addEventListener('click', () => {
  document.querySelectorAll('#line-colors .swatch').forEach(s => s.classList.remove('active'));
  sw.classList.add('active'); lineColor = sw.dataset.lc; render();
}));
document.getElementById('line-custom-color').addEventListener('input', function() {
  lineColor=this.value; document.querySelectorAll('#line-colors .swatch').forEach(s=>s.classList.remove('active')); render();
});

document.querySelectorAll('[data-w]').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('[data-w]').forEach(x => x.classList.remove('active'));
  b.classList.add('active'); drawWidth = parseInt(b.dataset.w);
}));

// Player modal
function buildPColors() {
  const row = document.getElementById('player-color-row');
  row.innerHTML = '';
  chosenColor = PCOLS[0];
  PCOLS.forEach((c,i) => {
    const s = document.createElement('div');
    s.className = 'pswatch' + (i===0?' active':'');
    s.style.background = c;
    s.addEventListener('click', () => {
      document.querySelectorAll('.pswatch').forEach(x=>x.classList.remove('active'));
      s.classList.add('active'); chosenColor = c;
    });
    row.appendChild(s);
  });
}

document.getElementById('btn-undo').addEventListener('click', undo);

let pendingPos = null;
document.getElementById('btn-add-player').addEventListener('click', () => {
  pendingPos = { x: W*0.5, y: GOAL_PX + H*0.55 };
  buildPColors();
  document.getElementById('player-name-input').value = '';
  document.getElementById('modal-overlay').classList.add('show');
  setTimeout(() => document.getElementById('player-name-input').focus(), 80);
});

function confirmPlayer() {
  const name = document.getElementById('player-name-input').value.trim();
  if (pendingPos) {
    saveState();
    players.push({ id: Date.now()+Math.random(), x: pendingPos.x+(Math.random()-.5)*50, y: pendingPos.y+(Math.random()-.5)*50, name, color: chosenColor });
    render();
  }
  closeModal();
}

document.getElementById('modal-confirm').addEventListener('click', confirmPlayer);
document.getElementById('player-name-input').addEventListener('keydown', e => {
  if (e.key==='Enter') confirmPlayer();
  if (e.key==='Escape') closeModal();
});
document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target===document.getElementById('modal-overlay')) closeModal();
});
function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); pendingPos=null; }

document.getElementById('btn-clear').addEventListener('click', () => {
  if (confirm('Rensa alla spelare och ritningar?')) { players=[]; balls=[]; drawnLines=[]; render(); }
});

// ── Ball modal ──
const BALLCOLS = ['#ffffff','#f87171','#fb923c','#facc15','#4ade80','#60a5fa','#c084fc','#ec4899'];
let chosenBallColor = '#ffffff';

function buildBallColors() {
  const row = document.getElementById('ball-color-row');
  row.innerHTML = '';
  chosenBallColor = '#ffffff';
  BALLCOLS.forEach((c,i) => {
    const s = document.createElement('div');
    s.className = 'pswatch' + (i===0?' active':'');
    s.style.background = c;
    if (c==='#ffffff') s.style.border = '2px solid #666';
    s.addEventListener('click', () => {
      document.querySelectorAll('#ball-color-row .pswatch').forEach(x=>x.classList.remove('active'));
      s.classList.add('active'); chosenBallColor = c;
    });
    row.appendChild(s);
  });
}

document.getElementById('btn-add-ball').addEventListener('click', () => {
  buildBallColors();
  document.getElementById('ball-modal-overlay').classList.add('show');
});

document.getElementById('ball-modal-confirm').addEventListener('click', () => {
  saveState();
  balls.push({ id: Date.now()+Math.random(), x: W*0.5 + (Math.random()-.5)*40, y: GOAL_PX + H*0.5 + (Math.random()-.5)*40, color: chosenBallColor });
  render();
  document.getElementById('ball-modal-overlay').classList.remove('show');
});
document.getElementById('ball-modal-cancel').addEventListener('click', () => {
  document.getElementById('ball-modal-overlay').classList.remove('show');
});
document.getElementById('ball-modal-overlay').addEventListener('click', e => {
  if (e.target===document.getElementById('ball-modal-overlay')) document.getElementById('ball-modal-overlay').classList.remove('show');
});

window.addEventListener('resize', resize);
resize();
